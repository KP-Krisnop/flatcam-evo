name: flatcam

channels:
  - conda-forge
  - defaults

dependencies:
  - python=3.11
  # System-level libraries (easiest via conda-forge)
  - gdal
  - geos
  - freetype
  - libspatialindex
  - qpdf
  - pkg-config
  # Core numeric / geometry
  - numpy>=1.16,<2.0
  - shapely>=2.0
  # GUI
  - pyqt
  - matplotlib>=3.5.0
  # Data / file formats
  - lxml
  - pikepdf>=2.0
  - reportlab>=3.5
  - rtree
  - rasterio
  - ezdxf
  - fonttools
  # pip-only packages
  - pip
  - pip:
    - setuptools
    - cycler>=0.10
    - python-dateutil>=2.1
    - kiwisolver>=1.1
    - six
    - dill
    - simplejson
    - qrcode>=6.1
    - ortools>=7.0
    - svg.path>=4.0
    - svglib
    - pyserial>=3.4
    - pyppeteer
    - pyopengl
    - PyQt6>=6.1.0
    - freetype-py
    - vispy>=0.9.0
    - svgtrace
    - darkdetect
